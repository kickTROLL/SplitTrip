spring.application.name=travel-book

# Database - auto-reads Railway's MySQL variables, falls back to local
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:niet_travel}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Initialize database schema and data automatically
spring.sql.init.mode=always

# JSP Configuration
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Server port - Railway sets PORT env var
server.port=${PORT:8080}

# Optional: logging for JDBC
logging.level.org.springframework.jdbc.core.JdbcTemplate=WARN
